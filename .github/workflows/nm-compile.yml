name: NM Compile Tests (NEPL-g2)

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

jobs:
    build:
        runs-on: ubuntu-latest

        env:
            CARGO_TERM_COLOR: always

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Shared bootstrap build
              uses: ./.github/actions/bootstrap-build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: nm-build
                  path: |
                      dist
                      target/debug
                      target/wasm32-unknown-unknown
                  compression-level: 1

    wasm-test:
        runs-on: ubuntu-latest
        needs: build

        env:
            CARGO_TERM_COLOR: always

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: nm-build
                  path: .

            - name: Install Rust toolchain
              uses: actions-rs/toolchain@v1
              with:
                  profile: minimal
                  toolchain: stable
                  override: true

            - name: NM Compile tests (no run)
              run: cargo run -p nepl-cli -- --target wasi --profile debug --input examples/nm.nepl --output target/ci-nm
