name: NEPL Test WASI (NEPL-g2)

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

jobs:
    build:
        runs-on: ubuntu-latest

        env:
            CARGO_TERM_COLOR: always

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Shared bootstrap build
              uses: ./.github/actions/bootstrap-build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: wasi-build
                  path: |
                      dist
                      target/debug
                      target/wasm32-unknown-unknown
                  compression-level: 1

    wasi-test:
        runs-on: ubuntu-latest
        needs: build

        env:
            CARGO_TERM_COLOR: always

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: wasi-build
                  path: .

            - name: Install Rust toolchain
              uses: actions-rs/toolchain@v1
              with:
                  profile: minimal
                  toolchain: stable
                  override: true

            - name: NEPL-g2 doctests
              env:
                  NO_COLOR: "true"
              run: |
                  node nodesrc/tests.js -i tests -o tests-current.json -j 4

            - name: CLI multi-emit output
              run: |
                  cargo run -p nepl-cli -- -i examples/counter.nepl -o target/ci-counter --emit wasm,wat,wat-min
                  test -f target/ci-counter.wasm
                  test -f target/ci-counter.wat
                  test -f target/ci-counter.min.wat
