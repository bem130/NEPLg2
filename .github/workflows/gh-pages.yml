name: Deploy NEPL-g2 playground to GitHub Pages

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

env:
    TRUNK_VERSION: latest

jobs:
    build:
        runs-on: ubuntu-latest

        env:
            CARGO_TERM_COLOR: always

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Shared bootstrap build
              uses: ./.github/actions/bootstrap-build
              with:
                  trunk-version: ${{ env.TRUNK_VERSION }}

            - name: Run cargo test (allowed to fail)
              id: cargo_test
              continue-on-error: true
              env:
                  NO_COLOR: "true"
              run: |
                  set -o pipefail
                  cargo test --no-fail-fast 2>&1 | tee cargo-test.log

            - name: Record shared trunk build success
              id: trunk_build
              run: echo "shared trunk build completed" > /tmp/trunk-build-ok.txt

            - name: Prepare dist (always) and attach test/build logs
              if: always()
              run: |
                  set -u
                  mkdir -p dist/tests

                  # If trunk didn't generate dist/index.html, create a 1-line placeholder.
                  if [ ! -f dist/index.html ]; then
                      echo "Playground build failed. See /tests/trunk-build.log" > dist/index.html
                  fi

                  # Attach logs (create empty files if missing so links won't 404)
                  : > dist/tests/cargo-test.log
                  : > dist/tests/trunk-build.log

                  if [ -f cargo-test.log ]; then
                      cp -f cargo-test.log dist/tests/cargo-test.log
                  fi
                  if [ -f trunk-build.log ]; then
                      cp -f trunk-build.log dist/tests/trunk-build.log
                  fi

                  # Also store outcomes (plain text, 1 line each)
                  echo "cargo_test_outcome=${{ steps.cargo_test.outcome }}" > dist/tests/outcomes.txt
                  echo "trunk_build_outcome=${{ steps.trunk_build.outcome }}" >> dist/tests/outcomes.txt

                  # Copy OGP image
                  cp -f NEPLg2.png dist/NEPLg2.png

            - name: Build tutorials/stdlib HTML (allowed to fail)
              id: doc_build
              if: always()
              continue-on-error: true
              run: |
                  set -o pipefail
                  rm -rf dist/tutorials dist/doc/stdlib
                  node nodesrc/cli.js -i tutorials/getting_started -o html_play=dist/tutorials/getting_started --site-name "NEPLg2 Tutorial" --description-prefix "NEPLg2 Getting Started tutorial" 2>&1 | tee doc-build.log
                  node nodesrc/cli.js -i stdlib -o html_play=dist/doc/stdlib --exclude-dir tests --exclude-dir tests_backup --site-name "NEPLg2 Standard Library" --description-prefix "NEPLg2 Standard Library" 2>&1 | tee -a doc-build.log

            - name: Run doctests (tests + tutorials + stdlib) and write dist/tests.json (allowed to fail)
              id: doctest
              if: always()
              continue-on-error: true
              run: |
                  set -o pipefail
                  node nodesrc/tests.js -i tests -i tutorials -i stdlib -o dist/tests.json 2>&1 | tee doctest.log

                  # Add logs for browsing
                  mkdir -p dist/tests
                  cp -f doctest.log dist/tests/doctest.log || true
                  cp -f doc-build.log dist/tests/doc-build.log || true

            - name: Upload GitHub Pages artifact (always)
              if: always()
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        needs: build
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
