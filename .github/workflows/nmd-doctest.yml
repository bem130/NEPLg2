name: N.MD Doctest (Node)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TRUNK_VERSION: latest
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Shared bootstrap build
        uses: ./.github/actions/bootstrap-build
        with:
          trunk-version: ${{ env.TRUNK_VERSION }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nmd-build
          path: |
            dist
            target/debug
            target/wasm32-unknown-unknown
          compression-level: 1

  nmd-doctest:
    runs-on: ubuntu-latest
    needs: build
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nmd-build
          path: .

      - name: Run .n.md doctests
        env:
          NO_COLOR: "true"
        run: |
          node nodesrc/tests.js -i tests -i tutorials -i stdlib -o nmd-tests.json -j 4

      - name: Upload doctest JSON (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nmd-tests
          path: |
            nmd-tests.json
