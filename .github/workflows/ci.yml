name: CI (NEPL-g2)

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always
    NO_COLOR: "true"
    NEPL_TEST_CASE_TIMEOUT_MS: "20000"
    NEPL_WASIX_TIMEOUT_MS: "20000"

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Shared bootstrap build
              uses: ./.github/actions/bootstrap-build

            - name: Build tutorials HTML into dist
              run: |
                  rm -rf dist/tutorials
                  node nodesrc/cli.js -i tutorials/getting_started -o html_play=dist/tutorials/getting_started --site-name "NEPLg2 Tutorial" --description-prefix "NEPLg2 Getting Started tutorial"

            - name: Build stdlib HTML into dist
              run: |
                  rm -rf dist/doc/stdlib
                  node nodesrc/cli.js -i stdlib -o html_play=dist/doc/stdlib --exclude-dir tests --exclude-dir tests_backup --site-name "NEPLg2 Standard Library" --description-prefix "NEPLg2 Standard Library"

            - name: Upload bootstrap build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: bootstrap-build
                  path: |
                      dist
                      target/debug
                      target/wasm32-unknown-unknown
                  compression-level: 1

    compile-test:
        runs-on: ubuntu-latest
        needs: build
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Restore Cargo cache
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: nepl-g2
                  cache-on-failure: true

            - name: Download bootstrap build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: bootstrap-build
                  path: .

            - name: Install Rust toolchain
              uses: actions-rs/toolchain@v1
              with:
                  profile: minimal
                  toolchain: stable
                  override: true

            - name: Install wasm32 target
              run: rustup target add wasm32-unknown-unknown

            - name: Rust compile tests (no run)
              run: timeout --signal=KILL 10m cargo test --no-run --all --all-features --locked

            - name: Rust compile tests wasm32 (no run)
              run: timeout --signal=KILL 10m cargo test --target wasm32-unknown-unknown --no-run --all --all-features --locked

    rust-test:
        runs-on: ubuntu-latest
        needs: build
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Restore Cargo cache
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: nepl-g2
                  cache-on-failure: true

            - name: Download bootstrap build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: bootstrap-build
                  path: .

            - name: Install Rust toolchain
              uses: actions-rs/toolchain@v1
              with:
                  profile: minimal
                  toolchain: stable
                  override: true

            - name: Rust tests
              run: timeout --signal=KILL 10m cargo test --all --all-features --locked --no-fail-fast
              run: timeout --signal=KILL 10m cargo test --all --all-features --no-fail-fast

    nm-compile:
        runs-on: ubuntu-latest
        needs: build
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Restore Cargo cache
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: nepl-g2
                  cache-on-failure: true

            - name: Download bootstrap build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: bootstrap-build
                  path: .

            - name: Install Rust toolchain
              uses: actions-rs/toolchain@v1
              with:
                  profile: minimal
                  toolchain: stable
                  override: true

            - name: NM compile tests
              run: timeout --signal=KILL 10m cargo run -p nepl-cli -- --target wasi --profile debug --input examples/nm.nepl --output target/ci-nm

    wasi-test:
        runs-on: ubuntu-latest
        needs: build
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Restore Cargo cache
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: nepl-g2
                  cache-on-failure: true

            - name: Download bootstrap build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: bootstrap-build
                  path: .

            - name: Install Rust toolchain
              uses: actions-rs/toolchain@v1
              with:
                  profile: minimal
                  toolchain: stable
                  override: true

            - name: NEPL-g2 doctests
              run: timeout --signal=KILL 10m node nodesrc/tests.js -i tests -o tests-current.json -j 4

            - name: CLI multi-emit output
              run: |
                  timeout --signal=KILL 10m cargo run -p nepl-cli -- -i examples/counter.nepl -o target/ci-counter --emit wasm,wat,wat-min
                  test -f target/ci-counter.wasm
                  test -f target/ci-counter.wat
                  test -f target/ci-counter.min.wat

            - name: Upload wasi doctest JSON
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: wasi-tests
                  path: tests-current.json
                  if-no-files-found: ignore

    nmd-doctest:
        runs-on: ubuntu-latest
        needs: build
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download bootstrap build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: bootstrap-build
                  path: .

            - name: Run .n.md doctests
              run: timeout --signal=KILL 10m node nodesrc/tests.js -i tests -i tutorials -i stdlib -o nmd-tests.json -j 4

            - name: Upload doctest JSON
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: nmd-tests
                  path: nmd-tests.json
                  if-no-files-found: ignore

    llvm-test:
        runs-on: ubuntu-latest
        needs: build
        timeout-minutes: 10

        env:
            LLVM_VERSION: "21.1.0"
            LLVM_DIR: "${{ github.workspace }}/.cache/llvm/21.1.0"

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Restore Cargo cache
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: nepl-g2
                  cache-on-failure: true

            - name: Download bootstrap build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: bootstrap-build
                  path: .

            - name: Install Rust toolchain
              uses: actions-rs/toolchain@v1
              with:
                  profile: minimal
                  toolchain: stable
                  override: true

            - name: Cache LLVM toolchain
              id: cache-llvm
              uses: actions/cache@v4
              with:
                  path: ${{ env.LLVM_DIR }}
                  key: llvm-${{ runner.os }}-${{ runner.arch }}-${{ env.LLVM_VERSION }}

            - name: Install clang 21.1.0 (linux native)
              if: steps.cache-llvm.outputs.cache-hit != 'true'
              run: |
                  curl -L -o /tmp/LLVM-${LLVM_VERSION}-Linux-X64.tar.xz \
                    https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/LLVM-${LLVM_VERSION}-Linux-X64.tar.xz
                  mkdir -p "${LLVM_DIR}"
                  tar -C "${LLVM_DIR}" --strip-components=1 -xf /tmp/LLVM-${LLVM_VERSION}-Linux-X64.tar.xz

            - name: Export LLVM environment
              run: |
                  echo "${LLVM_DIR}/bin" >> "${GITHUB_PATH}"
                  echo "NEPL_LLVM_CLANG_VERSION=${LLVM_VERSION}" >> "${GITHUB_ENV}"
                  echo "NEPL_LLVM_CLANG_BIN=${LLVM_DIR}/bin/clang" >> "${GITHUB_ENV}"
                  echo "NEPL_LLVM_REQUIRE_LINUX=1" >> "${GITHUB_ENV}"
                  echo "NEPL_LLVM_TRIPLE_CONTAINS=linux" >> "${GITHUB_ENV}"

            - name: Verify LLVM toolchain
              run: |
                  clang --version
                  llvm-as --version
                  llc --version
                  clang -dumpmachine | grep -q linux

            - name: LLVM doctests via nodesrc runner
              run: timeout --signal=KILL 10m node nodesrc/tests.js -i tests/llvm_target.n.md -o tests-llvm.json --runner llvm --llvm-compile-only --no-tree --no-stdlib -j 2

            - name: Full dual backend verification
              run: timeout --signal=KILL 10m node nodesrc/tests.js -i tests -i stdlib -o tests-dual-full.json --runner all --llvm-all --assert-io --strict-dual -j 2

            - name: Upload llvm doctest JSON
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: llvm-tests
                  path: |
                      tests-llvm.json
                      tests-dual-full.json
                  if-no-files-found: ignore

    pages-fast-bundle:
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'push'
        timeout-minutes: 10

        steps:
            - name: Download bootstrap build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: bootstrap-build
                  path: .

            - name: Mark site as pending
              run: |
                  mkdir -p dist/tests
                  cat > dist/tests/status.json <<'EOF'
                  {
                    "state": "pending",
                    "message": "Tests are still running."
                  }
                  EOF

            - name: Upload pending Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    pages-fast-deploy:
        runs-on: ubuntu-latest
        needs: pages-fast-bundle
        if: github.event_name == 'push'
        timeout-minutes: 10

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Configure Pages
              uses: actions/configure-pages@v5

            - name: Deploy pending site
              id: deployment
              uses: actions/deploy-pages@v4

    pages-final-bundle:
        runs-on: ubuntu-latest
        needs:
            - build
            - compile-test
            - rust-test
            - nm-compile
            - wasi-test
            - nmd-doctest
            - llvm-test
        if: always() && github.event_name == 'push'
        timeout-minutes: 10

        steps:
            - name: Download bootstrap build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: bootstrap-build
                  path: .

            - name: Download wasi test artifact
              continue-on-error: true
              uses: actions/download-artifact@v4
              with:
                  name: wasi-tests
                  path: artifacts/wasi

            - name: Download nmd test artifact
              continue-on-error: true
              uses: actions/download-artifact@v4
              with:
                  name: nmd-tests
                  path: artifacts/nmd

            - name: Download llvm test artifact
              continue-on-error: true
              uses: actions/download-artifact@v4
              with:
                  name: llvm-tests
                  path: artifacts/llvm

            - name: Merge test artifacts into dist
              run: |
                  mkdir -p dist/tests
                  cp -f artifacts/wasi/tests-current.json dist/tests/tests-current.json || true
                  cp -f artifacts/nmd/nmd-tests.json dist/tests/nmd-tests.json || true
                  cp -f artifacts/llvm/tests-llvm.json dist/tests/tests-llvm.json || true
                  cp -f artifacts/llvm/tests-dual-full.json dist/tests/tests-dual-full.json || true

            - name: Write final status summary
              run: |
                  mkdir -p dist/tests
                  cat > dist/tests/status.json <<EOF
                  {
                    "state": "final",
                    "compile_test": "${{ needs['compile-test'].result }}",
                    "rust_test": "${{ needs['rust-test'].result }}",
                    "nm_compile": "${{ needs['nm-compile'].result }}",
                    "wasi_test": "${{ needs['wasi-test'].result }}",
                    "nmd_doctest": "${{ needs['nmd-doctest'].result }}",
                    "llvm_test": "${{ needs['llvm-test'].result }}"
                  }
                  EOF

            - name: Upload final Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    pages-final-deploy:
        runs-on: ubuntu-latest
        needs:
            - pages-fast-deploy
            - pages-final-bundle
        if: always() && github.event_name == 'push'
        timeout-minutes: 10

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Configure Pages
              uses: actions/configure-pages@v5

            - name: Deploy final site
              id: deployment
              uses: actions/deploy-pages@v4
